name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: SwiftLint
        if: hashFiles('.swiftlint.yml') != ''
        run: |
          brew install swiftlint
          swiftlint lint --strict
