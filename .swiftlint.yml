# SwiftLint configuration for CCBar
# Matches existing code conventions

excluded:
  - .build
  - Package.swift

# Rule configuration
line_length:
  warning: 130
  error: 200

file_length:
  warning: 300
  error: 400

function_body_length:
  warning: 120
  error: 200

type_body_length:
  warning: 250
  error: 350

nesting:
  type_level: 2
  function_level: 2

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - ok
    - to

# Disabled rules
disabled_rules:
  - trailing_comma
  - todo
  - blanket_disable_command
